services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  agent:
    build: .
    ports:
      - "8080:8080"
    environment:
      AGENT_PORT: "8080"
      AGENT_TOKEN: "test-token-secret-123"
      S3_ENDPOINT: "minio:9000"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_USE_SSL: "false"
      S3_BUCKET: "backups"
      TEMP_DIR: "/tmp"
      MAX_WORKERS: "4"
      LOG_LEVEL: "debug"
      S3_TIMEOUT: 20m
      AGENT_WRITE_TIMEOUT: 15m
      AGENT_READ_TIMEOUT: 1      
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./test_data:/data

volumes:
  minio_data: